<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zvěřinova úkoly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Zvěřinova úkoly</h1>
            <div class="month-nav-area">
                <button class="month-btn" id="prevMonth">‹</button>
                <span id="currentDate"></span>
                <button class="month-btn" id="nextMonth">›</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="todos">Úkoly</button>
            <button class="tab" data-tab="deadlines">Deadlines</button>
        </div>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="Nový úkol...">
            <input type="date" id="todoDate">
            <button id="addBtn">+</button>
        </div>

        <div class="main-content">
            <ul id="todoList"></ul>
            <ul id="deadlineList" style="display: none;"></ul>
        </div>

        <div class="calendar-wrapper">
            <button class="cal-arrow" id="calLeft">‹</button>
            <div class="calendar" id="calendar"></div>
            <button class="cal-arrow" id="calRight">›</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
