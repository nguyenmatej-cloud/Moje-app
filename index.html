<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zvěřinova úkoly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Přihlašovací obrazovka -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Zvěřinova úkoly</h1>
            <p>Přihlaš se pro přístup k úkolům</p>
            <button class="google-btn" id="loginBtn">
                <img src="https://www.google.com/favicon.ico" width="20">
                Přihlásit se přes Google
            </button>
        </div>
    </div>

    <!-- Hlavní aplikace -->
    <div class="app" id="mainApp" style="display: none;">
        <div class="header">
            <div class="header-top">
                <h1>Zvěřinova úkoly</h1>
                <div class="user-info" id="userInfo"></div>
            </div>
            <div class="month-nav-area">
                <button class="month-btn" id="prevMonth">‹</button>
                <span id="currentDate"></span>
                <button class="month-btn" id="nextMonth">›</button>
                <button class="today-btn" id="todayBtn">Dnes</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="todos">Úkoly</button>
            <button class="tab" data-tab="deadlines">Deadlines</button>
        </div>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="Nový úkol...">
            <input type="date" id="todoDate">
            <select id="assignTo">
                <option value="">👤 Komu?</option>
            </select>
            <button id="addBtn">+</button>
        </div>

        <div class="main-content">
            <ul id="todoList"></ul>
            <ul id="deadlineList" style="display: none;"></ul>
        </div>

        <div class="calendar-wrapper">
            <button class="cal-arrow" id="calLeft">‹</button>
            <div class="calendar" id="calendar"></div>
            <button class="cal-arrow" id="calRight">›</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
